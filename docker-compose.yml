version: "3.9"

services:
  api:
    build: .
    container_name: fraudx-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models_optuna:/app/models_optuna
    command: uvicorn src.api:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build: .
    container_name: fraudx-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models_optuna:/app/models_optuna
    command: streamlit run app_streamlit.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    environment:
      - PYTHONUNBUFFERED=1

  retrain:
    build: .
    container_name: fraudx-retrain
    volumes:
      - ./data:/app/data
      - ./models_optuna:/app/models_optuna
    command: python retrain.py --min-samples 500
    profiles:
      - scheduler
    environment:
      - PYTHONUNBUFFERED=1
